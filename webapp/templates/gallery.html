<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>📸 Galeria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --grad:linear-gradient(135deg,#ff7eb3,#b06cff); --ink:#3a2b40; --soft:#8a7d92; --line:rgba(176,108,255,.16); }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{ font-family:"Quicksand",-apple-system,sans-serif; color:var(--ink);
    background:linear-gradient(165deg,#fff0f6,#f6ecff 55%,#eef1ff); min-height:100vh; }
  .app{ max-width:680px; margin:0 auto; }
  .head{ display:flex; align-items:center; gap:12px; padding:14px 16px; background:var(--grad); color:#fff;
    position:sticky; top:0; z-index:5; box-shadow:0 6px 22px rgba(176,108,255,.32); }
  .head .bk{ background:rgba(255,255,255,.2); border:none; color:#fff; width:38px; height:38px; border-radius:50%;
    font-size:18px; cursor:pointer; }
  .head .av{ width:42px; height:42px; border-radius:50%; object-fit:cover; border:2px solid rgba(255,255,255,.7);
    background:rgba(255,255,255,.25); display:grid; place-items:center; font-weight:700; }
  .head .nm{ font-weight:700; font-size:16px; } .head .sub{ font-size:12px; opacity:.9; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px; padding:12px; }
  .grid img{ width:100%; aspect-ratio:3/4; object-fit:cover; border-radius:14px; cursor:pointer; display:block;
    box-shadow:0 4px 14px rgba(140,100,160,.16); transition:.18s; }
  .grid img:hover{ transform:translateY(-3px); box-shadow:0 8px 22px rgba(176,108,255,.28); }
  .empty{ text-align:center; color:var(--soft); padding:70px 20px; }
  .lb{ position:fixed; inset:0; background:rgba(40,20,50,.92); display:none; align-items:center; justify-content:center; z-index:30; padding:16px; }
  .lb.show{ display:flex; } .lb img{ max-width:94vw; max-height:88vh; border-radius:14px; }
  .lb .x{ position:absolute; top:16px; right:20px; color:#fff; font-size:30px; cursor:pointer; }
  .banner{ display:block; text-align:center; color:#fff; font-weight:700; text-decoration:none; margin:8px 12px 18px;
    padding:14px; border-radius:16px; background:linear-gradient(120deg,#ff7eb3,#ff9ec7,#b06cff,#ff7eb3);
    background-size:300% 100%; animation:slide 6s ease infinite; box-shadow:0 6px 20px rgba(176,108,255,.3); }
  @keyframes slide{ 0%{background-position:0 50%;}50%{background-position:100% 50%;}100%{background-position:0 50%;} }
</style>
</head>
<body>
<div class="app">
  <div class="head">
    <button class="bk" onclick="location.href='/chat'">‹</button>
    <div class="av" id="av">💕</div>
    <div><div class="nm" id="nm">…</div><div class="sub">galeria de fotos</div></div>
  </div>
  <div class="grid" id="grid"></div>
  <a class="banner" id="banner" style="display:none" target="_blank" rel="noopener"></a>
</div>
<div class="lb" id="lb"><span class="x" onclick="closeLb()">✕</span><img id="lbimg"></div>
<script>
const $ = id => document.getElementById(id);
fetch('/api/chat/persona').then(r=>r.json()).then(p=>{
  $('nm').textContent = p.name || 'Galeria';
  if(p.avatar) $('av').innerHTML = `<img src="${p.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`;
  else $('av').textContent = (p.name||'?').charAt(0).toUpperCase();
  const g = p.gallery || [];
  if(!g.length){ $('grid').innerHTML = '<div class="empty">Em breve 💕</div>'; }
  else $('grid').innerHTML = g.map(x=>`<img src="${x.thumb}" loading="lazy" onclick="openLb('${x.full}')">`).join('');
  if(p.banner && p.banner.enabled && p.banner.title){
    const b=$('banner'); b.textContent=p.banner.title; b.href=p.banner.link||'#'; b.style.display='block';
  }
});
function openLb(src){ $('lbimg').src=src; $('lb').classList.add('show'); }
function closeLb(){ $('lb').classList.remove('show'); }
$('lb').addEventListener('click',e=>{ if(e.target.id==='lb') closeLb(); });
</script>
</body>
</html>
