<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Egglee · Biblioteca</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --border:#30363d; --text:#e6edf3; --muted:#8b949e; --accent:#2ea043; --accent2:#238636; --danger:#f85149; --blue:#1f6feb; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  header { padding:12px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:16px; }
  header h1 { font-size:16px; margin:0; }
  header a { color:var(--muted); text-decoration:none; font-size:14px; }
  header a:hover { color:var(--text); }
  .spacer { flex:1; }
  #search { padding:7px 11px; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:7px; width:240px; font-size:13px; }
  .layout { display:flex; min-height:calc(100vh - 49px); }
  .side { width:210px; border-right:1px solid var(--border); padding:16px 10px; flex-shrink:0; }
  .side .grp { font-size:11px; color:var(--muted); text-transform:uppercase; margin:14px 8px 6px; }
  .side a { display:flex; justify-content:space-between; padding:7px 10px; border-radius:6px; color:var(--text); text-decoration:none; font-size:13px; cursor:pointer; }
  .side a:hover { background:var(--panel); }
  .side a.active { background:var(--panel); color:var(--accent); }
  .side a .n { color:var(--muted); font-size:11px; }
  .main { flex:1; padding:16px 20px; }
  .toolbar { display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
  .toolbar .count { color:var(--muted); font-size:13px; }
  button.tb { font-size:13px; padding:7px 12px; border-radius:7px; border:1px solid var(--border); background:var(--panel); color:var(--text); cursor:pointer; }
  button.tb:hover { border-color:var(--muted); }
  button.tb.on { border-color:var(--blue); color:var(--blue); }
  button.tb.danger { color:var(--danger); }
  button.tb.danger:hover { border-color:var(--danger); }
  button.tb:disabled { opacity:.4; cursor:default; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:14px; }
  .cell { background:var(--panel); border:1px solid var(--border); border-radius:10px; overflow:hidden; position:relative; }
  .cell.sel { outline:2px solid var(--blue); }
  .cell .thumb { width:100%; aspect-ratio:3/4; object-fit:cover; display:block; cursor:pointer; }
  .star { position:absolute; top:7px; right:7px; font-size:18px; cursor:pointer; filter:drop-shadow(0 1px 2px #000); user-select:none; }
  .chk { position:absolute; top:7px; left:7px; width:20px; height:20px; cursor:pointer; }
  .meta { padding:7px 10px; font-size:11px; color:var(--muted); }
  .meta .wf { color:var(--text); font-weight:600; }
  .acts { display:flex; gap:6px; padding:0 10px 10px; }
  .acts a, .acts button { font-size:12px; padding:4px 8px; border-radius:6px; border:1px solid var(--border); background:var(--bg); color:var(--text); text-decoration:none; cursor:pointer; }
  .acts .del { color:var(--danger); }
  .empty { color:var(--muted); text-align:center; padding:60px 20px; }
  .lb { position:fixed; inset:0; background:rgba(0,0,0,.92); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:50; gap:14px; padding:20px; }
  .lb.show { display:flex; }
  .lb img, .lb video { max-width:88vw; max-height:74vh; border-radius:8px; }
  .lb .close { position:absolute; top:16px; right:22px; color:#fff; font-size:30px; cursor:pointer; }
  .lb .info { color:var(--muted); font-size:13px; max-width:700px; text-align:center; }
  .lb .tags { display:flex; gap:8px; align-items:center; }
  .lb .tags input { padding:7px 10px; background:var(--panel); color:var(--text); border:1px solid var(--border); border-radius:7px; width:340px; }
  .lb .tags button { padding:7px 12px; border-radius:7px; border:1px solid var(--border); background:var(--panel); color:var(--text); cursor:pointer; }
  .modal { position:fixed; inset:0; background:rgba(0,0,0,.7); display:none; align-items:center; justify-content:center; z-index:60; }
  .modal.show { display:flex; }
  .modal .box { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:22px; width:340px; max-height:70vh; overflow:auto; }
  .modal .mt { font-size:15px; font-weight:600; margin-bottom:14px; }
  .mfolders { display:flex; flex-direction:column; gap:8px; }
  .mf { text-align:left; padding:10px 12px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); cursor:pointer; font-size:14px; }
  .mf:hover { border-color:var(--blue); }
  .mf.new { color:var(--accent); border-style:dashed; }
  .dlbtn { padding:7px 12px; border-radius:7px; border:1px solid var(--border); background:var(--panel); color:var(--text); text-decoration:none; font-size:13px; }
  .dlbtn:hover { border-color:var(--accent); color:var(--accent); }
</style>
</head>
<body>
<header>
  <h1>🥚 Biblioteca</h1>
  <a href="/">← Gerar</a>
  <a onclick="openStats()" style="cursor:pointer">📊 Dashboard</a>
  <a onclick="openWatermark()" style="cursor:pointer">🏷️ Marca d'água</a>
  <div class="spacer"></div>
  <input id="search" placeholder="Buscar por prompt ou tag…">
  <a href="/logout">Sair</a>
</header>

<div class="layout">
  <div class="side" id="side"></div>
  <div class="main">
    <div class="toolbar">
      <span class="count" id="count"></span>
      <div class="spacer"></div>
      <button class="tb" id="selBtn" onclick="toggleSelectMode()">Selecionar</button>
      <button class="tb" id="allBtn" onclick="selectAll()" style="display:none">Selecionar todos</button>
      <button class="tb" id="upBtn" onclick="bulkUpscale()" style="display:none" disabled>✨ Upscalar</button>
      <button class="tb" id="zipBtn" onclick="bulkZip()" style="display:none" disabled>⬇ Baixar zip</button>
      <label class="tb" id="zipWmLbl" style="display:none"><input type="checkbox" id="zipWm"> 🏷️ c/ marca</label>
      <button class="tb" id="moveBtn" onclick="bulkMove()" style="display:none" disabled>📁 Mover</button>
      <button class="tb danger" id="delBtn" onclick="bulkDelete()" style="display:none" disabled>🗑 Deletar</button>
      <span id="libStatus" style="color:var(--accent);font-size:13px"></span>
    </div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none"></div>
  </div>
</div>

<div class="modal" id="moveModal">
  <div class="box">
    <div class="mt">Mover <span id="moveCount"></span> para…</div>
    <div id="moveFolders" class="mfolders"></div>
  </div>
</div>

<div class="modal" id="statsModal">
  <div class="box">
    <div class="mt">📊 Dashboard</div>
    <div id="statsBody" style="font-size:14px;line-height:2"></div>
  </div>
</div>

<div class="modal" id="wmModal">
  <div class="box">
    <div class="mt">🏷️ Marca d'água</div>
    <label style="font-size:12px;color:var(--muted)">Texto (vazio = sem marca)</label>
    <input id="wmText" placeholder="@suamodelo" style="width:100%;padding:9px;margin:4px 0 12px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:7px">
    <label style="font-size:12px;color:var(--muted)">Posição</label>
    <select id="wmPos" style="width:100%;padding:9px;margin:4px 0 12px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:7px">
      <option value="br">Inferior direita</option>
      <option value="bl">Inferior esquerda</option>
      <option value="tr">Superior direita</option>
      <option value="tl">Superior esquerda</option>
    </select>
    <label style="font-size:12px;color:var(--muted)">Transparência: <span id="wmOpVal">35</span>%</label>
    <input id="wmOp" type="range" min="10" max="90" value="35" style="width:100%;margin:4px 0 12px">
    <label style="font-size:12px;color:var(--muted)">Tamanho: <span id="wmSzVal">4</span>%</label>
    <input id="wmSz" type="range" min="2" max="10" value="4" style="width:100%;margin:4px 0 16px">
    <button onclick="saveWatermark()" style="width:100%;padding:11px;background:var(--accent2);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer">Salvar</button>
  </div>
</div>

<div class="modal" id="vidModal">
  <div class="box">
    <div class="mt">🎬 Animar imagem (vídeo)</div>
    <label style="font-size:12px;color:var(--muted)">Fonte</label>
    <select id="vidSource" onchange="onVidSource()" style="width:100%;padding:9px;margin:4px 0 12px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:7px">
      <option value="api" selected>API (OpenRouter) — 10/15s, sem GPU sua</option>
      <option value="wan">Self-host (Wan) — 5s, sua GPU</option>
    </select>
    <div id="vidModelWrap">
    <label style="font-size:12px;color:var(--muted)">Modelo</label>
    <select id="vidModel" style="width:100%;padding:9px;margin:4px 0 12px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:7px">
      <option value="">Carregando modelos…</option>
    </select>
    </div>
    <label style="font-size:12px;color:var(--muted)">Movimento (prompt)</label>
    <textarea id="vidPrompt" placeholder="leve giro de cabeça, cabelo balançando ao vento, sorriso suave, câmera estática" style="width:100%;height:64px;padding:9px;margin:4px 0 12px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:7px;font-size:13px"></textarea>
    <div style="display:flex;gap:8px">
      <div style="flex:1">
        <label style="font-size:12px;color:var(--muted)">Duração</label>
        <select id="vidDur" style="width:100%;padding:9px;margin:4px 0 12px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:7px">
          <option value="5">5s</option><option value="10" selected>10s</option><option value="15">15s</option>
        </select>
      </div>
      <div style="flex:1">
        <label style="font-size:12px;color:var(--muted)">Proporção</label>
        <select id="vidAr" style="width:100%;padding:9px;margin:4px 0 12px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:7px">
          <option value="9:16" selected>9:16 (Reels)</option><option value="1:1">1:1</option><option value="16:9">16:9</option>
        </select>
      </div>
    </div>
    <label style="font-size:12px;color:var(--muted)">Resolução</label>
    <select id="vidRes" style="width:100%;padding:9px;margin:4px 0 14px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:7px">
      <option value="720p" selected>720p (recomendado)</option><option value="480p">480p</option><option value="1080p">1080p (se o modelo suportar)</option>
    </select>
    <button id="vidGo" onclick="genVideo()" style="width:100%;padding:11px;background:var(--accent2);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer">Gerar vídeo</button>
    <div id="vidStatus" style="font-size:12px;color:var(--muted);margin-top:10px;text-align:center"></div>
  </div>
</div>

<div class="lb" id="lb">
  <span class="close" onclick="closeLb()">✕</span>
  <div id="lbContent"></div>
  <div class="info" id="lbInfo"></div>
  <div class="tags">
    <input id="lbTags" placeholder="tags separadas por vírgula">
    <button onclick="saveTags()">Salvar tags</button>
    <button onclick="makeVariations(4)">🔁 4 variações</button>
    <button onclick="upscaleOne()">✨ Alta definição</button>
    <button onclick="openVideo()" id="vidBtn">🎬 Animar</button>
    <select id="capLang" title="Idioma da legenda" style="padding:7px 8px;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:7px">
      <option value="">🌐 Auto</option>
      <option value="pt">🇧🇷 PT</option>
      <option value="en">🇺🇸 EN</option>
    </select>
    <button onclick="genCaption()" id="capBtn">✍️ Legenda IA</button>
  </div>
  <div id="lbCaption" style="display:none; max-width:700px; width:100%">
    <textarea id="lbCaptionText" style="width:100%; height:150px; background:var(--panel); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:10px; font-size:13px"></textarea>
    <button onclick="copyCaption()" style="margin-top:6px; padding:7px 12px; border-radius:7px; border:1px solid var(--border); background:var(--panel); color:var(--text); cursor:pointer">📋 Copiar</button>
  </div>
  <div class="tags">
    <a id="dlOrig" href="#" download class="dlbtn">⬇ Original</a>
    <a id="dlWm" href="#" download class="dlbtn">⬇ Com marca d'água</a>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let items = [], selectMode = false, selected = new Set();
let curFolder = '', curFav = false, curQ = '', curType = '', lbId = null, lbItem = null, working = false;

async function load() {
  const p = new URLSearchParams();
  if (curFolder) p.set('folder', curFolder);
  if (curFav) p.set('favorite', '1');
  if (curType) p.set('type', curType);
  if (curQ) p.set('q', curQ);
  const r = await fetch('/api/library?' + p.toString());
  const data = await r.json();
  if (!data.configured) { $('empty').style.display='block'; $('empty').textContent='Biblioteca não configurada.'; return; }
  items = data.items || [];
  renderSide(data.folders || []);
  renderGrid();
}

let allFolders = [];
function renderSide(folders) {
  allFolders = folders;
  const total = folders.reduce((s,f)=>s+f.n,0);
  const side = $('side'); side.innerHTML = '';
  side.appendChild(grp('Filtros'));
  side.appendChild(navItem('Todos', total, !curFolder && !curFav && !curType, () => { curFolder=''; curFav=false; curType=''; load(); }));
  side.appendChild(navItem('⭐ Favoritos', '', curFav, () => { curFav=true; curFolder=''; curType=''; load(); }));
  side.appendChild(navItem('🖼️ Imagens', '', curType==='image', () => { curType='image'; curFav=false; curFolder=''; load(); }));
  side.appendChild(navItem('🎬 Vídeos', '', curType==='video', () => { curType='video'; curFav=false; curFolder=''; load(); }));

  const ph = grp('Pastas');
  const add = document.createElement('span');
  add.textContent = '＋'; add.title = 'Nova pasta';
  add.style.cssText = 'float:right;cursor:pointer;color:var(--accent);font-size:14px';
  add.onclick = createFolder; ph.appendChild(add);
  side.appendChild(ph);

  folders.forEach(f => {
    const row = navItem(f.folder, f.n, curFolder===f.folder && !curFav, () => { curFolder=f.folder; curFav=false; load(); });
    if (f.folder !== 'Geral') {
      const fa = row.querySelector('.fa');
      const ed = document.createElement('span'); ed.textContent='✏️'; ed.title='Renomear';
      ed.style.cssText='cursor:pointer;margin-left:6px;font-size:11px';
      ed.onclick = e => { e.stopPropagation(); renameFolder(f.folder); };
      const rm = document.createElement('span'); rm.textContent='🗑'; rm.title='Excluir';
      rm.style.cssText='cursor:pointer;margin-left:4px;font-size:11px';
      rm.onclick = e => { e.stopPropagation(); deleteFolder(f.folder); };
      fa.appendChild(ed); fa.appendChild(rm);
    }
    side.appendChild(row);
  });
}
function grp(t){ const d=document.createElement('div'); d.className='grp'; d.textContent=t; return d; }
function navItem(label, n, active, fn){
  const a=document.createElement('a'); a.className=active?'active':'';
  a.innerHTML = `<span>${label}</span><span class="fa"><span class="n">${n}</span></span>`;
  a.onclick = fn; return a;
}

async function createFolder(){
  const name = prompt('Nome da nova pasta:'); if(!name) return;
  await fetch('/api/folders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name.trim()})});
  load();
}
async function renameFolder(old){
  const nn = prompt('Renomear pasta:', old); if(!nn||nn.trim()===old) return;
  await fetch('/api/folders/rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({old,new:nn.trim()})});
  if(curFolder===old) curFolder=nn.trim(); load();
}
async function deleteFolder(name){
  if(!confirm('Excluir a pasta "'+name+'"? As imagens voltam para Geral.')) return;
  await fetch('/api/folders/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name})});
  if(curFolder===name) curFolder=''; load();
}

function renderGrid() {
  $('count').textContent = items.length + ' arquivos';
  $('empty').style.display = items.length ? 'none' : 'block';
  if (!items.length) $('empty').textContent = 'Nada por aqui.';
  const grid = $('grid'); grid.innerHTML = '';
  items.forEach(it => {
    const cell = document.createElement('div');
    cell.className = 'cell' + (selected.has(it.id) ? ' sel' : '');
    const media = it.type === 'video'
      ? `<video class="thumb" src="${it.url}" muted preload="none"></video>`
      : `<img class="thumb" src="/api/thumb/${it.id}" loading="lazy" decoding="async">`;
    const date = it.created_at ? new Date(it.created_at).toLocaleString('pt-BR') : '';
    cell.innerHTML =
      (selectMode ? `<input type="checkbox" class="chk" ${selected.has(it.id)?'checked':''}>` : '') +
      `<span class="star">${it.favorite ? '⭐' : '☆'}</span>` +
      media +
      `<div class="meta"><span class="wf">${it.workflow||it.type}</span> · ${it.folder||''}<br>${date}</div>` +
      `<div class="acts"><a href="${it.url}" download>⬇</a><button class="del">🗑</button></div>`;
    // wires
    cell.querySelector('.thumb').onclick = () => selectMode ? toggleSel(it.id, cell) : openLb(it);
    cell.querySelector('.star').onclick = (e) => { e.stopPropagation(); toggleFav(it); };
    cell.querySelector('.del').onclick = (e) => { e.stopPropagation(); delOne(it.id); };
    if (selectMode) cell.querySelector('.chk').onclick = () => toggleSel(it.id, cell);
    grid.appendChild(cell);
  });
  updateBulkButtons();
}

// ── Seleção ───────────────────────────────────────────────
function toggleSelectMode() {
  selectMode = !selectMode; selected.clear();
  $('selBtn').classList.toggle('on', selectMode);
  $('selBtn').textContent = selectMode ? 'Cancelar' : 'Selecionar';
  ['allBtn','upBtn','zipBtn','zipWmLbl','moveBtn','delBtn'].forEach(id => $(id).style.display = selectMode ? '' : 'none');
  renderGrid();
}
function toggleSel(id, cell) {
  selected.has(id) ? selected.delete(id) : selected.add(id);
  cell.classList.toggle('sel', selected.has(id));
  const chk = cell.querySelector('.chk'); if (chk) chk.checked = selected.has(id);
  updateBulkButtons();
}
function selectAll() {
  if (selected.size === items.length) selected.clear();
  else items.forEach(it => selected.add(it.id));
  renderGrid();
}
function updateBulkButtons() {
  const has = selected.size > 0;
  ['upBtn','zipBtn','moveBtn','delBtn'].forEach(id => { const b=$(id); if(b) b.disabled = !has; });
  if (selectMode) $('count').textContent = selected.size + ' selecionados / ' + items.length;
}

// ── Ações ─────────────────────────────────────────────────
async function toggleFav(it) {
  it.favorite = !it.favorite;
  await fetch('/api/library/favorite', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id:it.id, value:it.favorite})});
  renderGrid();
}
async function delOne(id) {
  if (!confirm('Deletar este arquivo?')) return;
  await fetch('/api/library/' + id, {method:'DELETE'});
  load();
}
async function bulkDelete() {
  if (!selected.size || !confirm('Deletar ' + selected.size + ' arquivos?')) return;
  await fetch('/api/library/delete', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ids:[...selected]})});
  selected.clear(); load();
}
function bulkMove() {
  if (!selected.size) return;
  $('moveCount').textContent = selected.size + (selected.size>1?' itens':' item');
  const box = $('moveFolders'); box.innerHTML = '';
  allFolders.forEach(f => {
    const b = document.createElement('button'); b.className = 'mf';
    b.textContent = f.folder + ' (' + f.n + ')';
    b.onclick = () => doMove(f.folder); box.appendChild(b);
  });
  const nb = document.createElement('button'); nb.className = 'mf new'; nb.textContent = '＋ Nova pasta';
  nb.onclick = async () => {
    const n = prompt('Nome da nova pasta:'); if (!n) return;
    await fetch('/api/folders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n.trim()})});
    doMove(n.trim());
  };
  box.appendChild(nb);
  $('moveModal').classList.add('show');
}
async function doMove(folder) {
  await fetch('/api/library/move', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ids:[...selected], folder})});
  $('moveModal').classList.remove('show'); selected.clear(); load();
}
async function bulkZip() {
  if (!selected.size) return;
  $('zipBtn').disabled = true; $('zipBtn').textContent = 'Baixando…';
  const zip = new JSZip(); let i = 0;
  const wm = $('zipWm') && $('zipWm').checked ? '?watermark=1' : '';
  for (const it of items.filter(x => selected.has(x.id))) {
    try {
      const blob = await (await fetch('/api/media/' + it.id + (it.type==='video'?'':wm))).blob();
      const ext = it.type === 'video' ? 'mp4' : 'png';
      zip.file('egglee_' + String(++i).padStart(3,'0') + '.' + ext, blob);
    } catch (e) {}
  }
  const out = await zip.generateAsync({type:'blob'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(out); a.download = 'egglee_selecao.zip'; a.click();
  $('zipBtn').disabled = false; $('zipBtn').textContent = '⬇ Baixar zip';
}

// ── Geração a partir da biblioteca (upscale / variações) ──
function setLibStatus(m, err){
  const el = $('libStatus'); el.textContent = m || '';
  el.style.color = err ? 'var(--danger)' : 'var(--accent)';
}
// Busca a imagem via backend (proxy) → base64. Evita CORS do R2.
async function idToBase64(id){
  const resp = await fetch('/api/media/' + id);
  if(!resp.ok) throw new Error('não foi possível ler a imagem (HTTP ' + resp.status + ')');
  const blob = await resp.blob();
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('falha ao ler a imagem'));
    r.readAsDataURL(blob);
  });
}
function pollJob(id, maxTries, intervalMs){
  maxTries = maxTries || 300; intervalMs = intervalMs || 2000;
  return new Promise((resolve, reject) => {
    let n = 0, done = false;
    const finish = (fn, arg) => { if (done) return; done = true; fn(arg); };
    const tick = async () => {
      if (done) return;
      n++;
      if (n > maxTries) { finish(reject, new Error('tempo esgotado')); return; }
      try {
        const d = await (await fetch('/api/status/' + id)).json();
        if (done) return;
        if (d.status === 'COMPLETED') { finish(resolve, d); return; }
        if (d.status === 'FAILED') { finish(reject, new Error('job falhou no RunPod: ' + JSON.stringify(d.output || d.error || ''))); return; }
        if ($('vidStatus') && $('vidModal').classList.contains('show'))
          $('vidStatus').textContent = 'Gerando na sua GPU… (' + Math.round(n*intervalMs/1000) + 's, status: ' + (d.status || '...') + ')';
      } catch (e) {}
      if (!done) setTimeout(tick, intervalMs);
    };
    tick();
  });
}
async function runGen(body){
  const r = await fetch('/api/generate', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  const data = await r.json();
  if(!r.ok || data.error) throw new Error(data.error || ('HTTP ' + r.status));
  // Vídeo (Wan) pode levar bem mais: cold start (carrega 30GB) + render. ~35 min.
  const isVid = (body.workflow_name || '').includes('video');
  const result = data.status === 'COMPLETED' ? data
                 : await pollJob(data.id, isVid ? 700 : 300, isVid ? 3000 : 2000);
  if(result.output && result.output.error) throw new Error(result.output.error);
  const out = (result.output && result.output.outputs) || [];
  if(!out.length) throw new Error('sem saída do worker');
  return out;
}
async function saveMedia(o, prompt, workflow, folder){
  await fetch('/api/library/save', {method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({data:o.data, type:o.type, prompt, workflow, folder})});
}
async function upscaleItem(it){
  const b64 = await idToBase64(it.id);
  const out = await runGen({workflow_name:'upscale', character:'model', input_image_b64:b64, batch_size:1, seed:'-1', no_grain:true});
  for(const o of out) await saveMedia(o, it.prompt||'', 'upscale', it.folder||'Geral');
}
async function bulkUpscale(){
  if(working) return;
  const sel = items.filter(x => selected.has(x.id) && x.type!=='video');
  if(!sel.length) return;
  working=true; let ok=0, fail=0;
  for(let i=0;i<sel.length;i++){
    setLibStatus('Upscalando ' + (i+1) + '/' + sel.length + '… (✓' + ok + (fail?' ✗'+fail:'') + ')');
    try{ await upscaleItem(sel[i]); ok++; }
    catch(e){ fail++; setLibStatus('Erro: ' + e.message, true); await sleep(2500); }
  }
  working=false; selected.clear();
  setLibStatus(fail ? ('Concluído com ' + fail + ' falha(s)') : ('✓ ' + ok + ' upscaladas'), fail>0);
  load();
}
async function upscaleOne(){
  if(!lbItem || working) return;
  working=true; const it=lbItem; closeLb(); setLibStatus('Upscalando…');
  try{ await upscaleItem(it); setLibStatus('✓ alta definição criada'); }
  catch(e){ setLibStatus('Erro no upscale: ' + e.message, true); }
  working=false; load();
}
async function makeVariations(n){
  if(!lbItem || working) return;
  working=true; const it=lbItem; closeLb();
  let b64, ok=0, fail=0;
  try { setLibStatus('Lendo imagem…'); b64 = await idToBase64(it.id); }
  catch(e){ setLibStatus('Erro: ' + e.message, true); working=false; return; }
  for(let k=0;k<n;k++){
    setLibStatus('Gerando variação ' + (k+1) + '/' + n + '… (✓' + ok + (fail?' ✗'+fail:'') + ')');
    try{
      const out = await runGen({workflow_name:'img2img', character:'model', prompt:it.prompt||'', input_image_b64:b64, batch_size:1, seed:'-1'});
      for(const o of out) await saveMedia(o, it.prompt||'', 'img2img', it.folder||'Geral');
      ok++;
    }catch(e){ fail++; setLibStatus('Erro: ' + e.message, true); await sleep(2500); }
  }
  working=false;
  setLibStatus(fail ? (ok + ' criadas, ' + fail + ' falha(s)') : ('✓ ' + ok + ' variações criadas'), fail>0);
  load();
}
function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

// ── Dashboard ─────────────────────────────────────────────
function fmtBytes(b){
  if(!b) return '0 B';
  const u=['B','KB','MB','GB','TB']; let i=0; b=Number(b);
  while(b>=1024 && i<u.length-1){ b/=1024; i++; }
  return b.toFixed(i?1:0)+' '+u[i];
}
async function openStats(){
  $('statsBody').innerHTML = 'Carregando…';
  $('statsModal').classList.add('show');
  try{
    const s = await (await fetch('/api/stats')).json();
    $('statsBody').innerHTML =
      `📦 Total de arquivos: <b>${s.total||0}</b><br>`+
      `🖼️ Imagens: <b>${s.images||0}</b><br>`+
      `🎬 Vídeos: <b>${s.videos||0}</b><br>`+
      `⭐ Favoritos: <b>${s.favorites||0}</b><br>`+
      `📁 Pastas: <b>${s.folders||0}</b><br>`+
      `📝 Presets de prompt: <b>${s.presets||0}</b><br>`+
      `💾 Armazenamento: <b>${fmtBytes(s.bytes)}</b> <span style="color:var(--muted)">(de 10 GB grátis no R2)</span>`;
  }catch(e){ $('statsBody').textContent = 'Erro ao carregar estatísticas.'; }
}
$('statsModal').addEventListener('click', e => { if(e.target.id==='statsModal') $('statsModal').classList.remove('show'); });

// ── Legenda IA (DeepSeek) ─────────────────────────────────
async function genCaption(){
  if(!lbItem) return;
  $('capBtn').disabled = true; $('capBtn').textContent = 'Gerando…';
  try{
    const r = await fetch('/api/caption', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({prompt: lbItem.prompt || '', lang: $('capLang').value})});
    const d = await r.json();
    if(!r.ok || d.error) throw new Error(d.error || ('HTTP '+r.status));
    $('lbCaptionText').value = d.caption;
    $('lbCaption').style.display = 'block';
  }catch(e){
    $('lbCaptionText').value = 'Erro: ' + e.message;
    $('lbCaption').style.display = 'block';
  }
  $('capBtn').disabled = false; $('capBtn').textContent = '✍️ Legenda IA';
}
function copyCaption(){
  const t = $('lbCaptionText'); t.select();
  navigator.clipboard.writeText(t.value).then(()=>{}, ()=>{ document.execCommand('copy'); });
}

// ── Lightbox / tags ───────────────────────────────────────
function openLb(it) {
  lbId = it.id; lbItem = it;
  $('lbContent').innerHTML = it.type === 'video'
    ? `<video src="${it.url}" controls autoplay loop></video>`
    : `<img src="${it.url}">`;
  $('lbInfo').textContent = (it.prompt || '(sem prompt)');
  $('lbTags').value = it.tags || '';
  $('lbCaption').style.display = 'none';
  $('capBtn').disabled = false; $('capBtn').textContent = '✍️ Legenda IA';
  $('dlOrig').href = it.url;
  $('dlWm').href = '/api/media/' + it.id + '?watermark=1';
  $('dlWm').style.display = it.type === 'video' ? 'none' : '';
  $('vidBtn').style.display = it.type === 'video' ? 'none' : '';
  $('lb').classList.add('show');
}
function closeLb() { $('lb').classList.remove('show'); $('lbContent').innerHTML=''; lbId=null; }
$('lb').addEventListener('click', e => { if (e.target.id === 'lb') closeLb(); });
$('moveModal').addEventListener('click', e => { if (e.target.id === 'moveModal') $('moveModal').classList.remove('show'); });
async function saveTags() {
  if (!lbId) return;
  await fetch('/api/library/tags', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id:lbId, tags:$('lbTags').value})});
  const it = items.find(x=>x.id===lbId); if (it) it.tags = $('lbTags').value;
  closeLb();
}

// ── Vídeo (Image-to-Video via OpenRouter) ─────────────────
let vidModelsLoaded = false;
async function loadVideoModels() {
  if (vidModelsLoaded) return;
  try {
    const r = await fetch('/api/video/models');
    const d = await r.json();
    const sel = $('vidModel');
    if (!d.configured) { sel.innerHTML = '<option value="">Configure OPENROUTER_API_KEY no Railway</option>'; return; }
    if (!d.models || !d.models.length) { sel.innerHTML = '<option value="">Nenhum modelo disponível' + (d.error ? ' ('+d.error+')' : '') + '</option>'; return; }
    sel.innerHTML = d.models.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
    vidModelsLoaded = true;
  } catch (e) {
    $('vidModel').innerHTML = '<option value="">Erro ao listar modelos</option>';
  }
}
function openVideo() {
  if (!lbId || (lbItem && lbItem.type === 'video')) return;
  $('vidStatus').textContent = '';
  $('vidGo').disabled = false;
  $('vidModal').classList.add('show');
  onVidSource();
  loadVideoModels();
}
$('vidModal').addEventListener('click', e => { if (e.target.id === 'vidModal') $('vidModal').classList.remove('show'); });

function onVidSource() {
  const wan = $('vidSource').value === 'wan';
  $('vidModelWrap').style.display = wan ? 'none' : '';
  // Self-host (passo A) só faz 5s; trava a duração.
  $('vidDur').disabled = wan;
  if (wan) $('vidDur').value = '5';
}

async function genVideoWan() {
  const folder = (lbItem && lbItem.folder) || 'Geral';
  const srcId = lbId;
  $('vidGo').disabled = true;
  $('vidStatus').textContent = 'Preparando imagem…';
  let out;
  try {
    const b64 = await idToBase64(srcId);
    $('vidStatus').textContent = 'Gerando na sua GPU… (cold start + render, pode levar minutos)';
    out = await runGen({
      workflow_name: 'video_i2v', character: '', input_image_b64: b64,
      prompt: $('vidPrompt').value.trim(),
      resolution: $('vidRes').value, aspect_ratio: $('vidAr').value, duration: 5,
    });
  } catch (e) {
    $('vidStatus').textContent = '❌ ' + e.message; $('vidGo').disabled = false; return;
  }
  try {
    for (const o of out) await saveMedia(o, $('vidPrompt').value.trim(), 'wan-i2v', folder);
  } catch (e) {
    $('vidStatus').textContent = '❌ erro ao salvar: ' + e.message; $('vidGo').disabled = false; return;
  }
  $('vidStatus').textContent = '✅ Vídeo pronto! Salvo na biblioteca.';
  setTimeout(() => { $('vidModal').classList.remove('show'); closeLb(); curType='video'; curFav=false; curFolder=''; load(); }, 1200);
}

async function genVideo() {
  if ($('vidSource').value === 'wan') return genVideoWan();
  const model = $('vidModel').value;
  if (!model) { $('vidStatus').textContent = 'Escolha um modelo.'; return; }
  const srcId = lbId;
  const folder = (lbItem && lbItem.folder) || 'Geral';
  const body = {
    media_id: srcId, model,
    prompt: $('vidPrompt').value.trim(),
    duration: $('vidDur').value,
    resolution: $('vidRes').value,
    aspect_ratio: $('vidAr').value,
    folder,
  };
  $('vidGo').disabled = true;
  $('vidStatus').textContent = 'Enviando job…';
  let job;
  try {
    const r = await fetch('/api/video/generate', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
    job = await r.json();
    if (!r.ok || job.error) throw new Error(job.error || ('HTTP ' + r.status));
  } catch (e) {
    $('vidStatus').textContent = '❌ ' + e.message; $('vidGo').disabled = false; return;
  }
  if (!job.polling_url) { $('vidStatus').textContent = '❌ resposta sem polling_url'; $('vidGo').disabled = false; return; }
  pollVideo(job.polling_url, body.prompt, folder, 0);
}

function pollVideo(polling_url, prompt, folder, n) {
  $('vidStatus').textContent = 'Gerando vídeo… (' + (n*10) + 's) — pode levar alguns minutos';
  let done = false;
  const tick = async () => {
    if (done) return;
    n++;
    try {
      const r = await fetch('/api/video/status', {method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({polling_url, prompt, folder})});
      const d = await r.json();
      if (done) return;
      if (d.status === 'completed') {
        done = true;
        $('vidStatus').textContent = '✅ Vídeo pronto! Salvo na biblioteca.';
        setTimeout(() => { $('vidModal').classList.remove('show'); closeLb(); curType='video'; curFav=false; curFolder=''; load(); }, 1200);
        return;
      }
      if (d.status === 'failed' || d.status === 'cancelled' || d.status === 'expired') {
        done = true;
        $('vidStatus').textContent = '❌ ' + (d.error ? JSON.stringify(d.error) : d.status) + ' (pode ser filtro de conteúdo)';
        $('vidGo').disabled = false;
        return;
      }
      $('vidStatus').textContent = 'Gerando vídeo… (' + (n*10) + 's) — ' + (d.status || 'pending');
    } catch (e) {}
    if (!done) setTimeout(tick, 10000);
  };
  setTimeout(tick, 10000);
}

load();
