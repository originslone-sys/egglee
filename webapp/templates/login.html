<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Egglee · Login</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="apple-touch-icon" href="/static/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/app.css">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .login { width:340px; max-width:100%; padding:34px 30px; text-align:center; }
  .login .logo-big { width:60px; height:60px; border-radius:16px; background:var(--grad); display:grid;
    place-items:center; font-size:30px; margin:0 auto 16px; box-shadow:0 8px 28px rgba(176,108,255,.5); }
  .login h1 { font-size:22px; margin:0 0 4px; font-weight:700; }
  .login h1 b { background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .login p { color:var(--muted); font-size:13.5px; margin:0 0 22px; }
  .login label { text-align:left; }
  .err { color:var(--danger); font-size:13px; margin-top:12px; }
</style>
</head>
<body>
  <form class="login card" method="post">
    <div class="logo-big">🥚</div>
    <h1>Egg<b>lee</b></h1>
    <p>Entrar na sua conta</p>
    <label>E-mail</label>
    <input type="email" name="email" autofocus placeholder="voce@email.com" autocomplete="email">
    <label style="margin-top:10px">Senha</label>
    <input type="password" name="password" placeholder="••••••••" autocomplete="current-password">
    <button type="submit" class="btn" style="width:100%;margin-top:18px">Entrar</button>
    {% if error %}<div class="err">⚠️ {{ error }}</div>{% endif %}
    <p style="margin:16px 0 0;font-size:13px">Não tem conta?
      <a href="/signup" style="color:var(--accent);text-decoration:none;font-weight:600">Criar conta</a>
    </p>
  </form>
</body>
</html>
