<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Egglee · Criar conta</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="apple-touch-icon" href="/static/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/app.css">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .login { width:360px; max-width:100%; padding:34px 30px; text-align:center; }
  .login .logo-big { width:60px; height:60px; border-radius:16px; background:url("/static/favicon.svg") center/cover no-repeat; font-size:0; margin:0 auto 16px; box-shadow:0 8px 28px rgba(176,108,255,.5); }
  .login h1 { font-size:22px; margin:0 0 4px; font-weight:700; }
  .login h1 b { background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .login p { color:var(--muted); font-size:13.5px; margin:0 0 22px; }
  .login label { text-align:left; }
  .err { color:var(--danger); font-size:13px; margin-top:12px; }
  .b18 { display:inline-block; margin-top:14px; padding:3px 10px; border:1px solid var(--border);
    border-radius:999px; color:var(--muted); font-size:11px; font-weight:600; }
</style>
</head>
<body>
  <form class="login card" method="post">
    <div class="logo-big"></div>
    <h1>Egg<b>lee</b></h1>
    <p>Criar sua conta</p>
    <label>Nome</label>
    <input type="text" name="name" placeholder="Como podemos te chamar?" autocomplete="name">
    <label style="margin-top:10px">E-mail</label>
    <input type="email" name="email" required placeholder="voce@email.com" autocomplete="email">
    <label style="margin-top:10px">Senha (mín. 6 caracteres)</label>
    <input type="password" name="password" required placeholder="••••••••" autocomplete="new-password">
    <button type="submit" class="btn" style="width:100%;margin-top:18px">Criar conta</button>
    {% if error %}<div class="err">⚠️ {{ error }}</div>{% endif %}
    <p style="margin:16px 0 0;font-size:13px">Já tem conta?
      <a href="/login" style="color:var(--accent);text-decoration:none;font-weight:600">Entrar</a>
    </p>
    <div class="b18">🔞 Somente para maiores de 18 anos</div>
  </form>
</body>
</html>
