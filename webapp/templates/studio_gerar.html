<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Egglee · Gerar</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="apple-touch-icon" href="/static/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/app.css">
<style>
  .wrap { display:grid; grid-template-columns:400px 1fr; gap:22px; padding:22px; max-width:1400px; margin:0 auto; align-items:start; }
  @media (max-width:900px){ .wrap { grid-template-columns:1fr; } }
  .controls { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
  .drop { border:1.5px dashed var(--border-2); border-radius:var(--radius-sm); padding:16px; text-align:center; cursor:pointer; font-size:13px; color:var(--muted); }
  .drop:hover { border-color:var(--accent2); color:var(--text); }
  .drop img { max-width:100%; max-height:130px; border-radius:8px; margin-top:8px; }
  .status { font-size:13px; color:var(--accent); margin-top:14px; min-height:18px; }
  .status.err { color:var(--danger); }
  .lrow { display:flex; align-items:center; gap:9px; font-size:13px; margin:6px 0; }
  .lrow .lname { flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .lrow input[type=range]{ width:90px; } .lrow .lwv { width:34px; text-align:right; color:var(--accent); }
  .lrow input[type=checkbox]{ width:auto; accent-color:var(--accent2); }
  .none { font-size:12.5px; color:var(--muted); }
  .quota { background:var(--grad-soft); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px; font-size:12.5px; margin-bottom:14px; }
  .quota b { color:var(--accent); }
  .rq { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:18px; min-height:60vh; }
  .rq .h { display:flex; align-items:center; margin-bottom:12px; }
  .rq .h a { margin-left:auto; font-size:13px; color:var(--accent); text-decoration:none; }
  .jrow { display:flex; align-items:center; gap:12px; padding:10px; border:1px solid var(--border); border-radius:var(--radius-sm); margin-bottom:8px; }
  .jrow .thumb { width:52px; height:64px; border-radius:8px; object-fit:cover; background:var(--bg-soft); flex-shrink:0; }
  .jrow .mid { flex:1; min-width:0; }
  .jrow .pp { font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .jrow .sub { font-size:11.5px; color:var(--muted); }
  .st { font-size:11px; font-weight:600; padding:2px 9px; border-radius:999px; white-space:nowrap; }
  .st.queued { color:#b0a; background:rgba(176,108,255,.14); }
  .st.processing { color:#e59; background:rgba(255,126,179,.16); }
  .st.done { color:var(--ok); background:rgba(80,220,150,.14); }
  .st.failed { color:var(--danger); background:rgba(255,90,110,.14); }
  .spin { display:inline-block; width:9px; height:9px; border:2px solid rgba(255,255,255,.3); border-top-color:#e59; border-radius:50%; animation:sp .7s linear infinite; margin-right:5px; vertical-align:-1px; }
  @keyframes sp { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="topbar">
  <a href="/studio" class="brand"><span class="logo">🥚</span> <span>Egg<b>lee</b></span></a>
  <button class="menu-btn" onclick="document.getElementById('nav').classList.toggle('open')">☰</button>
  <nav class="nav" id="nav">
    <a href="/studio">🏠 Estúdio</a>
    <a href="/studio/gerar" class="active">✨ Gerar</a>
    <a href="/studio/fila">📥 Requisições</a>
    <a href="/studio/pro">⭐ Pro</a>
    <a href="/library">🖼️ Biblioteca</a>
    <a href="/persona">💬 Persona</a>
  </nav>
  <div class="sp"></div>
  <div class="right"><a href="/logout" class="ghost">Sair</a></div>
</div>

<div class="wrap">
  <div class="controls">
    <div class="quota" id="quota">carregando cota…</div>

    <label>O que criar</label>
    <select id="workflow" onchange="syncUI()">
      <option value="txt2img">Texto → Imagem</option>
      <option value="img2img">Imagem → Imagem</option>
      <option value="video_i2v">Imagem → Vídeo</option>
    </select>

    <div id="ckptBox">
      <label>Modelo base</label>
      <select id="checkpoint"><option value="">—</option></select>
    </div>

    <div id="inputBox" class="hidden">
      <label>Imagem de entrada</label>
      <div class="drop" id="inputDrop">Clique para enviar a imagem
        <input type="file" id="inputFile" accept="image/*" class="hidden">
      </div>
    </div>

    <label id="promptLbl">Prompt (cena, roupa, pose, lugar…)</label>
    <textarea id="prompt" placeholder="ex.: sitting on a beach, white dress, golden hour"></textarea>

    <label>Prompt negativo (opcional)</label>
    <textarea id="negative" placeholder="(deixe vazio para o padrão)"></textarea>

    <div id="loraBox">
      <label>🧩 Estilos (LoRAs)</label>
      <div id="loraStack"></div>
    </div>

    <div class="row" id="imgOpts">
      <div><label>Qualidade</label><select id="quality"><option value="draft">Rápido</option><option value="standard" selected>Padrão</option></select></div>
      <div><label>Quantidade</label><select id="batch"><option>1</option><option>2</option><option selected>4</option></select></div>
      <div><label>Seed (-1 = aleatória)</label><input type="number" id="seed" placeholder="-1"></div>
    </div>

    <button class="go" id="goBtn" onclick="run()">Enviar pra fila</button>
    <div class="status" id="status"></div>
  </div>

  <div class="rq">
    <div class="h"><div class="sec-title" style="margin:0">📥 Suas requisições</div><a href="/studio/fila">ver todas →</a></div>
    <div id="jobs"><div class="none">nenhuma ainda</div></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let inputB64 = null, LORAS = [], DEFAULTS = {};

fetch('/api/client/models').then(r=>r.json()).then(d=>{
  const cks = d.checkpoints || [];
  $('checkpoint').innerHTML = cks.length
    ? cks.map(c=>`<option value="${c}">${c.replace('.safetensors','')}</option>`).join('')
    : '<option value="">(nenhum liberado)</option>';
  LORAS = d.loras || []; DEFAULTS = d.defaults || {};
  renderLoras();
}).catch(()=>{});

function renderLoras(){
  if(!LORAS.length){ $('loraStack').innerHTML='<div class="none">Nenhum estilo disponível ainda.</div>'; return; }
  $('loraStack').innerHTML = LORAS.map((n,i)=>{
    const w = DEFAULTS[n] ?? 0.6;
    return `<div class="lrow"><input type="checkbox" id="lc${i}"><span class="lname" title="${n}">${n.replace('.safetensors','')}</span>
      <input type="range" id="lw${i}" min="0" max="1" step="0.05" value="${w}" oninput="$('lv${i}').textContent=(+this.value).toFixed(2)">
      <span class="lwv" id="lv${i}">${(+w).toFixed(2)}</span></div>`;
  }).join('');
}
function buildLoras(){ return LORAS.map((n,i)=>({name:n,on:$('lc'+i).checked,weight:parseFloat($('lw'+i).value)})).filter(l=>l.on); }

function syncUI(){
  const wf=$('workflow').value, isVid=wf==='video_i2v';
  $('inputBox').classList.toggle('hidden', wf==='txt2img');
  $('ckptBox').classList.toggle('hidden', isVid);
  $('loraBox').classList.toggle('hidden', isVid);
  $('imgOpts').style.display = isVid ? 'none' : '';
  $('promptLbl').textContent = isVid ? 'Movimento (opcional)' : 'Prompt (cena, roupa, pose, lugar…)';
}
syncUI();

$('inputDrop').onclick = ()=> $('inputFile').click();
$('inputFile').onchange = e => { const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader(); rd.onload=()=>{ inputB64=rd.result.split(',')[1]; $('inputDrop').innerHTML='Trocar imagem<img src="'+rd.result+'">'; }; rd.readAsDataURL(f); };

function setStatus(t,err){ const s=$('status'); s.textContent=t; s.classList.toggle('err',!!err); }

function loadQuota(){
  fetch('/api/client/quota').then(r=>r.json()).then(q=>{
    const lim = v => v===-1 ? '∞' : v;
    if(q.img_limit===-1 && q.vid_limit===-1){
      $('quota').innerHTML = `Plano <b>${q.plan}</b> · ilimitado · <b>${q.conc_used}/${q.conc_limit}</b> na fila`;
    } else {
      $('quota').innerHTML = `Plano <b>${q.plan}</b> · imagens <b>${q.img_used}/${lim(q.img_limit)}</b> · vídeos <b>${q.vid_used}/${lim(q.vid_limit)}</b> `
        + `<a href="/studio/pro" style="color:var(--accent);font-weight:600;text-decoration:none">⭐ virar Pro</a>`;
    }
  }).catch(()=>{});
}
loadQuota();

async function run(){
  const wf=$('workflow').value;
  if((wf==='img2img'||wf==='video_i2v')&&!inputB64) return setStatus('Envie a imagem de entrada.',true);
  if(wf!=='video_i2v'&&!$('checkpoint').value) return setStatus('Nenhum modelo liberado ainda.',true);
  const body={workflow_name:wf, prompt:$('prompt').value.trim(), negative_prompt:$('negative').value.trim(), seed:$('seed').value.trim()||'-1'};
  if(wf==='video_i2v'){ body.input_image_b64=inputB64; body.resolution='720p'; body.aspect_ratio='9:16'; body.duration=5; }
  else { body.checkpoint=$('checkpoint').value; body.loras=buildLoras(); body.batch_size=$('batch').value; body.steps=$('quality').value==='draft'?20:30; if(wf==='img2img') body.input_image_b64=inputB64; }
  $('goBtn').disabled=true; setStatus('Enviando pra fila…');
  try{
    const r=await fetch('/api/jobs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    if(!r.ok||d.error) throw new Error(d.error||'falhou');
    setStatus('✓ Requisição #'+d.job.id+' na fila! Você pode enviar outra ou acompanhar aqui do lado.');
    loadQuota(); loadJobs();
  }catch(e){ setStatus('❌ '+e.message, true); }
  $('goBtn').disabled=false;
}

function esc(s){ return (s||'').replace(/</g,'&lt;'); }
const STLBL = {queued:'na fila', processing:'processando', done:'concluída', failed:'falhou', canceled:'cancelada'};
function jobRow(j){
  const thumb = (j.status==='done' && j.media && j.media.length)
    ? `<img class="thumb" src="/api/thumb/${j.media[0]}" loading="lazy">`
    : `<div class="thumb"></div>`;
  const spin = j.status==='processing' ? '<span class="spin"></span>' : '';
  return `<div class="jrow">${thumb}
    <div class="mid"><div class="pp">${esc(j.prompt)||'(sem prompt)'}</div>
      <div class="sub">${j.kind==='video'?'🎬 vídeo':'🖼️ imagem'} · #${j.id}</div></div>
    <span class="st ${j.status}">${spin}${STLBL[j.status]||j.status}</span></div>`;
}
function loadJobs(){
  fetch('/api/jobs').then(r=>r.json()).then(d=>{
    const js=(d.jobs||[]).slice(0,8);
    $('jobs').innerHTML = js.length ? js.map(jobRow).join('') : '<div class="none">nenhuma ainda</div>';
  }).catch(()=>{});
}
loadJobs();
setInterval(loadJobs, 4000);
setInterval(loadQuota, 8000);
</script>
</body>
</html>
