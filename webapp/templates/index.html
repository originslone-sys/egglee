<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Egglee · Painel de Geração</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="apple-touch-icon" href="/static/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/app.css">
<style>
  .wrap { display: grid; grid-template-columns: 400px 1fr; gap: 22px; padding: 22px; max-width: 1500px; margin: 0 auto; align-items: start; }
  @media (max-width: 900px) { .wrap { grid-template-columns: 1fr; } }
  .controls { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow-sm); }
  .result { min-height: 62vh; display: flex; flex-wrap: wrap; gap: 14px; align-items: center; align-content: center; justify-content: center;
            background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow-sm); }
  .result .cell { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .result.multi img { max-height: 46vh; }
  .result img, .result video { max-width: 100%; max-height: 74vh; border-radius: 12px; border: 1px solid var(--border); box-shadow: var(--shadow); }
  .placeholder { color: var(--muted); text-align: center; }
  .drop { border: 1.5px dashed var(--border-2); border-radius: var(--radius-sm); padding: 16px; text-align: center; cursor: pointer; font-size: 13px; color: var(--muted); transition: .15s; }
  .drop:hover { border-color: var(--accent2); color: var(--text); }
  .drop img { max-width: 100%; max-height: 130px; border-radius: 8px; margin-top: 8px; }
  .status { font-size: 13px; color: var(--muted); margin-top: 14px; min-height: 18px; }
  .status.err { color: var(--danger); }
  .dl { margin-top: 6px; font-size: 13px; color: var(--accent); text-decoration: none; display: block; }
  .lrow { display:flex; align-items:center; gap:9px; font-size:13px; }
  .lrow .lname { flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .lrow input[type=range] { width:90px; }
  .lrow .lwv { width:34px; text-align:right; color:var(--accent); }
  .lrow input[type=checkbox] { width:auto; accent-color:var(--accent2); }
  .dataset { margin-top: 24px; padding-top: 18px; border-top: 1px solid var(--border); }
  .dstitle { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .dshelp { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
</style>
</head>
<body>
<div class="topbar">
  <a href="/" class="brand"><span class="logo">🥚</span> <span>Egg<b>lee</b></span></a>
  <button class="menu-btn" onclick="document.getElementById('nav').classList.toggle('open')">☰</button>
  <nav class="nav" id="nav">
    <a href="/"><i class="ic ic-grid"></i> Dashboard</a>
    <a href="/generate" class="active"><i class="ic ic-spark"></i> Gerar</a>
    <a href="/library"><i class="ic ic-image"></i> Biblioteca</a>
    <a href="/persona"><i class="ic ic-chat"></i> Persona</a>
    <a href="/modelos"><i class="ic ic-box"></i> Modelos</a>
    <a href="/leads"><i class="ic ic-clip"></i> Leads</a>
    <a href="/usuarios"><i class="ic ic-users"></i> Usuários</a>
  </nav>
  <div class="sp"></div>
  <div class="right">
    <span class="dot" id="statusDot" title="status do endpoint"></span>
    <a href="/logout" class="ghost">Sair</a>
  </div>
</div>

<div class="wrap">
  <div class="controls">
    <label>Workflow</label>
    <select id="workflow">
      <option value="txt2img">Texto → Imagem</option>
      <option value="img2img">Imagem → Imagem</option>
      <option value="video_i2v">Imagem → Vídeo</option>
    </select>

    <label>Modelo base (checkpoint)</label>
    <select id="checkpoint">
      <option value="sdxl_checkpoint.safetensors">FameGrid Bold</option>
    </select>

    <div class="check">
      <input type="checkbox" id="useCharacter" checked>
      <label for="useCharacter">Usar character fixo da modelo</label>
    </div>


    <label>Prompt (cena, roupa, pose, lugar…)</label>
    <textarea id="prompt" placeholder="sitting on a beach, white bikini, golden hour"></textarea>
    <div class="row" style="margin-top:8px">
      <select id="presetSel"><option value="">— presets de prompt —</option></select>
      <button type="button" class="mini" id="savePresetBtn" title="Salvar o prompt atual como preset"><i class="ic ic-save"></i> Salvar</button>
      <button type="button" class="mini" id="delPresetBtn" title="Excluir o preset selecionado"><i class="ic ic-trash"></i></button>
    </div>

    <label>Prompt negativo (opcional)</label>
    <textarea id="negative" placeholder="(deixe vazio para usar o padrão)"></textarea>

    <label style="display:flex;align-items:center"><i class="ic ic-puzzle"></i> LoRAs ativos
      <button type="button" class="mini" onclick="saveLoraConfig()" style="margin-left:auto;padding:3px 9px" title="Salvar como padrão"><i class="ic ic-save"></i> padrão</button>
    </label>
    <div id="loraStack" style="display:flex;flex-direction:column;gap:9px;margin-top:4px"></div>

    <div id="faceBox" class="hidden">
      <label>Foto de referência do rosto</label>
      <div class="drop" id="faceDrop">Clique para enviar a foto base
        <input type="file" id="faceFile" accept="image/*" class="hidden">
      </div>
    </div>

    <div id="inputBox" class="hidden">
      <label>Imagem de entrada</label>
      <div class="drop" id="inputDrop">Clique para enviar a imagem
        <input type="file" id="inputFile" accept="image/*" class="hidden">
      </div>
    </div>

    <div class="row">
      <div>
        <label>Qualidade</label>
        <select id="quality">
          <option value="draft">Rascunho (rápido)</option>
          <option value="standard" selected>Padrão</option>
          <option value="hd">HD direto (lento)</option>
        </select>
      </div>
      <div>
        <label>Quantidade de imagens</label>
        <select id="batch">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="4" selected>4</option>
          <option value="6">6</option>
          <option value="8">8</option>
        </select>
      </div>
      <div>
        <label>Seed (-1 = aleatória)</label>
        <input type="number" id="seed" placeholder="-1">
      </div>
    </div>

    <button class="go" id="goBtn">Gerar</button>
    <div class="status" id="status"></div>

    <div class="dataset">
      <div class="dstitle">🎓 Dataset de treino (LoRA v2)</div>
      <div class="dshelp">Gera um conjunto variado usando o LoRA atual da personagem (sem âncora) para re-treinar uma v2 mais refinada.</div>
      <div class="row">
        <div>
          <label>Qtd. imagens</label>
          <input type="number" id="dsCount" value="36" min="8" max="60">
        </div>
      </div>
      <button class="go ds" id="dsBtn">Gerar dataset (.zip)</button>
      <div class="status" id="dsStatus"></div>
    </div>
  </div>

  <div class="result" id="result">
    <div class="placeholder" id="placeholder">O resultado aparece aqui.</div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let faceB64 = null, inputB64 = null, pollToken = 0, lastBody = null, autoUpscale = false;

// Salva uma mídia gerada na biblioteca (com retry pontual).
async function saveToLibrary(data, type, body, attempt = 1) {
  try {
    const r = await fetch('/api/library/save', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        data: data, type: type,
        prompt: body ? body.prompt : '',
        workflow: body ? body.workflow_name : ''
      })
    });
    const j = await r.json();
    if (!r.ok || j.ok === false) throw new Error(j.reason || ('HTTP ' + r.status));
  } catch (e) {
    if (attempt < 3) {
      await new Promise(res => setTimeout(res, 1500 * attempt));
      return saveToLibrary(data, type, body, attempt + 1);
    }
  }
}

// Mostra/esconde uploads conforme o workflow
function syncUI() {
  const wf = $('workflow').value;
  $('faceBox').classList.toggle('hidden', wf !== 'txt2img_faceid');
  $('inputBox').classList.toggle('hidden', !(wf === 'img2img' || wf === 'video_i2v'));
}
$('workflow').addEventListener('change', syncUI);
syncUI();

// Uploads
function wireDrop(dropId, fileId, setter, previewLabel) {
  $(dropId).addEventListener('click', () => $(fileId).click());
  $(fileId).addEventListener('change', e => {
    const f = e.target.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      setter(reader.result.split(',')[1]);
      $(dropId).innerHTML = previewLabel + '<img src="' + reader.result + '">';
      $(dropId).appendChild($(fileId));
    };
    reader.readAsDataURL(f);
  });
}
wireDrop('faceDrop', 'faceFile', v => faceB64 = v, 'Trocar foto');
wireDrop('inputDrop', 'inputFile', v => inputB64 = v, 'Trocar imagem');


// Prompts variados para o dataset (foco em variedade de ângulo/expressão/cena).
// Cena/enquadramento/roupa/luz/ângulo + variedade de expressão.
// Identidade/rosto vêm do LoRA (character), não destas descrições.
const DATASET_PROMPTS = [
  "closeup portrait, neutral expression, soft daylight, plain background",
  "closeup portrait, gentle smile, natural window light",
  "face closeup, three quarter view, soft smile",
  "face closeup, side profile, soft lighting",
  "closeup, laughing, soft indoor light",
  "closeup, calm expression, soft focus background",
  "upper body, bedroom mirror selfie, black crop top, neutral expression",
  "upper body, standing by the window, white t-shirt, smiling",
  "upper body, outdoors, golden hour sunlight, soft smile",
  "upper body, cafe background, casual sweater, gentle smile",
  "half body, sitting on bed, oversized hoodie, relaxed expression",
  "half body, kitchen background, tank top, smiling",
  "portrait, hair tied back, gym outfit, neutral expression",
  "portrait, hair down, evening indoor light, soft smile",
  "portrait, looking over shoulder, casual top",
  "portrait, soft shadows, plain wall background, calm expression",
  "upper body, beach background, summer top, smiling",
  "upper body, car selfie, daylight, neutral expression",
  "portrait, daylight, plain background, gentle smile",
  "portrait, looking up, natural light, soft smile",
  "half body, living room, jeans and t-shirt, laughing",
  "upper body, balcony, city background, neutral expression",
  "portrait, overcast soft light, calm expression",
  "closeup, big smile, soft light",
  "upper body, park background, light jacket, smiling",
  "portrait, warm indoor lamp light, soft smile",
  "half body, bedroom, casual loungewear, relaxed expression",
  "upper body, studio softbox lighting, plain background, neutral",
  "portrait, windblown hair, outdoor daylight, gentle smile",
  "upper body, mirror selfie, sporty outfit, neutral expression",
  "portrait, morning light, soft smile",
  "closeup, soft focus background, natural light, calm",
  "upper body, bookshelf background, cardigan, gentle smile",
  "portrait, sunlight, outdoor, smiling",
  "half body, hallway background, neutral expression",
  "upper body, plain studio, soft smile"
];

$('dsBtn').addEventListener('click', runDataset);

async function runDataset() {
  if (typeof JSZip === 'undefined') return setDs('JSZip não carregou; recarregue a página.', true);
  const total = Math.max(8, Math.min(60, parseInt($('dsCount').value) || 36));
  const zip = new JSZip();
  let ok = 0;
  $('dsBtn').disabled = true;

  let lastErr = '';
  for (let i = 0; i < total; i++) {
    const prompt = DATASET_PROMPTS[i % DATASET_PROMPTS.length];
    const body = {
      // v2: usa o LoRA da personagem (txt2img + character), sem âncora.
      // Identidade vem do LoRA v1; sem grão p/ treino limpo.
      workflow_name: 'txt2img',
      character: 'model',
      prompt: prompt,
      seed: '-1',
      batch_size: 1,
      no_grain: true,
    };
    let done = false;
    for (let attempt = 1; attempt <= 3 && !done; attempt++) {
      setDs('Gerando ' + (i + 1) + '/' + total + (attempt > 1 ? ' (tentativa ' + attempt + ')' : '') + '… ✓' + ok);
      try {
        const img = await generateOne(body);
        if (img) {
          zip.file('img_' + String(ok + 1).padStart(3, '0') + '.png', img, { base64: true });
          ok++; done = true;
        }
      } catch (e) {
        lastErr = e.message;
        await new Promise(r => setTimeout(r, 4000)); // espera antes de tentar de novo
      }
    }
  }

  if (ok === 0) { $('dsBtn').disabled = false; return setDs('Nenhuma imagem gerada. Erro: ' + lastErr + ' — verifique se o endpoint RunPod está ativo (teste o botão Gerar normal).', true); }
  setDs('Empacotando ' + ok + ' imagens…');
  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'dataset.zip'; a.click();
  setDs('✓ Dataset pronto: ' + ok + ' imagens baixadas (dataset.zip)');
  $('dsBtn').disabled = false;
}

// Dispara um job e retorna o base64 da 1ª imagem (ou null).
async function generateOne(body) {
  const r = await fetch('/api/generate', { method: 'POST', headers: headers(), body: JSON.stringify(body) });
  const data = await r.json();
  if (!r.ok || data.error) throw new Error(data.error || ('HTTP ' + r.status));
  const result = (data.status === 'COMPLETED') ? data : await pollOnce(data.id);
  const out = (result.output && result.output.outputs) || [];
  return out.length ? out[0].data : null;
}

function pollOnce(id) {
  return new Promise((resolve, reject) => {
    const t = setInterval(async () => {
      try {
        const r = await fetch('/api/status/' + id, { headers: headers() });
        const data = await r.json();
        if (data.status === 'COMPLETED') { clearInterval(t); resolve(data); }
        else if (data.status === 'FAILED') { clearInterval(t); reject(new Error('job falhou')); }
      } catch (e) { /* segue tentando */ }
    }, 2000);
  });
}

function setDs(msg, err) {
  const s = $('dsStatus'); s.textContent = msg; s.classList.toggle('err', !!err);
}

// Config / status dot
fetch('/api/config').then(r => r.json()).then(c => {
  if (c.configured) $('statusDot').classList.add('ok');
  else setStatus('Endpoint não configurado no Railway (RUNPOD_ENDPOINT_ID / RUNPOD_API_KEY).', true);
});

// ── Presets de prompt ─────────────────────────────────────
let presets = [];
async function loadPresets() {
  try {
    const d = await (await fetch('/api/presets')).json();
    presets = d.presets || [];
    const sel = $('presetSel');
    sel.innerHTML = '<option value="">— presets de prompt —</option>';
    presets.forEach(p => { const o = document.createElement('option'); o.value = p.id; o.textContent = p.name; sel.appendChild(o); });
  } catch (e) {}
}
$('presetSel').addEventListener('change', e => {
  const p = presets.find(x => String(x.id) === e.target.value);
  if (p) $('prompt').value = p.prompt;
});
$('savePresetBtn').addEventListener('click', async () => {
  const prompt = $('prompt').value.trim();
  if (!prompt) return alert('Escreva um prompt primeiro.');
  const name = window.prompt('Nome do preset:'); if (!name) return;
  await fetch('/api/presets', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:name.trim(), prompt})});
  loadPresets();
});
$('delPresetBtn').addEventListener('click', async () => {
  const id = $('presetSel').value; if (!id) return alert('Selecione um preset na lista.');
  if (!confirm('Excluir este preset?')) return;
  await fetch('/api/presets/' + id, {method:'DELETE'});
  loadPresets();
});
loadPresets();

// Popula o dropdown de checkpoint com o cache do Gerenciador de Modelos.
function ckptLabel(n){
  const base = n.replace(/\.(safetensors|ckpt|pt)$/i,'');
  if (base === 'sdxl_checkpoint') return 'FameGrid Bold';
  return base.replace(/_/g,' ');
}
fetch('/api/checkpoints').then(r=>r.json()).then(d=>{
  const sel = $('checkpoint'); const cur = sel.value;
  const list = (d.checkpoints && d.checkpoints.length) ? d.checkpoints : ['sdxl_checkpoint.safetensors'];
  sel.innerHTML = list.map(n=>`<option value="${n}">${ckptLabel(n)}</option>`).join('');
  const want = (d.active && list.includes(d.active)) ? d.active : cur;
  if ([...sel.options].some(o=>o.value===want)) sel.value = want;
}).catch(()=>{});

// ── LoRA stack (Power Lora Loader) ────────────────────────
let loraData = { character: 'egglee_character.safetensors', loras: [], config: {}, defaults: {} };
function loraLabel(n){ return n.replace(/\.(safetensors|ckpt|pt)$/i,'').replace(/_/g,' '); }
function loraRow(name, on, weight, locked){
  return `<div class="lrow" data-name="${name}">
    <input type="checkbox" class="lon" ${on?'checked':''} ${locked?'disabled':''}>
    <span class="lname">${loraLabel(name)}${locked?' 🔒':''}</span>
    <input type="range" class="lw" min="0" max="100" value="${Math.round(weight*100)}">
    <span class="lwv">${weight.toFixed(2)}</span></div>`;
}
function renderLoras(){
  const c = loraData.config||{}, dft = loraData.defaults||{};
  const cw = (c[loraData.character] && c[loraData.character].weight!=null) ? c[loraData.character].weight : (dft[loraData.character] ?? 0.8);
  let html = loraRow(loraData.character, true, cw, true);
  for(const n of (loraData.loras||[])){
    const cc = c[n]||{}; const on = cc.on!==undefined ? cc.on : true;
    const w = cc.weight!=null ? cc.weight : (dft[n] ?? 0.5);
    html += loraRow(n, on, w, false);
  }
  $('loraStack').innerHTML = html;
  document.querySelectorAll('#loraStack .lrow').forEach(row=>{
    const wv=row.querySelector('.lwv'), w=row.querySelector('.lw');
    w.addEventListener('input',()=>wv.textContent=(w.value/100).toFixed(2));
  });
}
fetch('/api/loras').then(r=>r.json()).then(d=>{ loraData=d; renderLoras(); }).catch(()=>{});
function buildLoras(){
  const out=[];
  document.querySelectorAll('#loraStack .lrow').forEach(row=>{
    out.push({ name:row.dataset.name, on:row.querySelector('.lon').checked,
               weight:+(row.querySelector('.lw').value/100).toFixed(2) });
  });
  return out;
}
async function saveLoraConfig(){
  const cfg={}; buildLoras().forEach(l=>cfg[l.name]={on:l.on,weight:l.weight});
  await fetch('/api/loras',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({config:cfg})});
  setStatus('LoRAs salvos como padrão ✓');
}

function setStatus(msg, err) {
  const s = $('status'); s.textContent = msg; s.classList.toggle('err', !!err);
}
function headers() {
  return {'Content-Type': 'application/json'};
}

$('goBtn').addEventListener('click', () => {
  const wf = $('workflow').value;
  if (wf === 'txt2img_faceid' && !faceB64) return setStatus('Envie a foto de referência do rosto.', true);
  if ((wf === 'img2img' || wf === 'video_i2v') && !inputB64) return setStatus('Envie a imagem de entrada.', true);

  const q = $('quality').value;
  const steps = q === 'draft' ? 20 : 30;
  autoUpscale = (q === 'hd' && wf === 'txt2img');

  const body = {
    workflow_name: wf,
    prompt: $('prompt').value.trim(),
    negative_prompt: $('negative').value.trim(),
    seed: $('seed').value.trim() || '-1',
    batch_size: autoUpscale ? '1' : $('batch').value,
    steps: steps,
    checkpoint: $('checkpoint').value,
    loras: buildLoras(),
  };
  if ($('useCharacter').checked) body.character = 'model';
  if (faceB64 && wf === 'txt2img_faceid') body.face_image_b64 = faceB64;
  if (inputB64 && (wf === 'img2img' || wf === 'video_i2v')) body.input_image_b64 = inputB64;

  runJob(body, autoUpscale ? 'Gerando + alta definição…' : 'Enviando para a fila…');
});

// Envia a imagem escolhida para o workflow de upscale (alta definição)
function upscaleImage(b64) {
  const body = {
    workflow_name: 'upscale',
    prompt: $('prompt').value.trim(),
    negative_prompt: $('negative').value.trim(),
    seed: '-1',
    batch_size: 1,
    input_image_b64: b64,
    no_grain: true,
    checkpoint: $('checkpoint').value,
    loras: buildLoras(),
  };
  if ($('useCharacter').checked) body.character = 'model';
  runJob(body, 'Gerando alta definição…');
}

async function runJob(body, loadingMsg) {
  pollToken++;            // invalida qualquer polling anterior
  lastBody = body;
  $('goBtn').disabled = true;
  showLoading(loadingMsg);
  try {
    const r = await fetch('/api/generate', {method: 'POST', headers: headers(), body: JSON.stringify(body)});
    const data = await r.json();
    if (!r.ok || data.error) throw new Error(data.error || ('HTTP ' + r.status));
    if (data.status === 'COMPLETED') return done(data);
    pollStatus(data.id);
  } catch (e) {
    $('goBtn').disabled = false; showError(e.message);
  }
}

function pollStatus(id) {
  const myToken = ++pollToken;   // só este polling fica válido
  let n = 0;
  setStatus('Na fila… (o worker pode levar ~1 min para ligar)');
  const tick = async () => {
    if (myToken !== pollToken) return;   // foi substituído por outro job
    n++;
    try {
      const r = await fetch('/api/status/' + id, {headers: headers()});
      const data = await r.json();
      if (myToken !== pollToken) return;
      if (data.status === 'COMPLETED') { done(data); return; }
      if (data.status === 'FAILED') {
        $('goBtn').disabled = false;
        showError('Job falhou: ' + JSON.stringify(data.output || data.error || ''));
        return;
      }
      setStatus((data.status === 'IN_PROGRESS' ? 'Gerando… (' : 'Na fila… (') + n*2 + 's)');
    } catch (e) { /* mantém tentando */ }
    setTimeout(tick, 2000);
  };
  tick();
}

function done(data) {
  $('goBtn').disabled = false;
  const out = (data.output && data.output.outputs) || [];
  if (data.output && data.output.error) return showError(data.output.error);
  if (!out.length) return showError('Sem saída. Resposta: ' + JSON.stringify(data.output || data));
  setStatus('Pronto ✓ (' + out.length + ')');
  const r = $('result'); r.innerHTML = '';
  r.classList.toggle('multi', out.length > 1);
  out.forEach(o => {
    const cell = document.createElement('div'); cell.className = 'cell';
    if (o.type === 'video') {
      const v = document.createElement('video');
      v.src = 'data:video/mp4;base64,' + o.data; v.controls = true; v.autoplay = true; v.loop = true;
      cell.appendChild(v);
      cell.appendChild(dl('data:video/mp4;base64,' + o.data, o.filename));
    } else {
      const src = 'data:image/png;base64,' + o.data;
      const img = document.createElement('img');
      img.src = src;
      cell.appendChild(img);
      const btn = document.createElement('button');
      btn.className = 'hd'; btn.textContent = '✨ Alta definição';
      btn.onclick = () => upscaleImage(o.data);
      cell.appendChild(btn);
      cell.appendChild(dl(src, o.filename));
    }
    saveToLibrary(o.data, o.type, lastBody);
    r.appendChild(cell);
  });
  // HD direto: encadeia o upscale automaticamente no resultado
  if (autoUpscale && lastBody && lastBody.workflow_name !== 'upscale'
      && out[0] && out[0].type !== 'video') {
    autoUpscale = false;
    setStatus('Aplicando alta definição…');
    upscaleImage(out[0].data);
  }
}

function dl(href, name) {
  const a = document.createElement('a');
  a.href = href; a.download = name || 'output'; a.textContent = '⬇ baixar ' + (name || '');
  a.className = 'dl'; a.style.display = 'block';
  return a;
}
function showLoading(msg) {
  $('result').innerHTML = '<div class="placeholder"><div class="spinner"></div>' + msg + '</div>';
  setStatus(msg);
}
function showError(msg) {
  setStatus(msg, true);
  $('result').innerHTML = '<div class="placeholder"><i class="ic ic-warn"></i> ' + msg + '</div>';
}
</script>
</body>
</html>
