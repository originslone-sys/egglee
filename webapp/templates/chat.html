<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>💬</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --rose:#ff6fa5; --pink:#ff9ec7; --lav:#b06cff; --grad:linear-gradient(135deg,#ff7eb3,#b06cff);
    --ink:#3a2b40; --soft:#8a7d92; --line:rgba(176,108,255,.16); --card:#ffffff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0;}
  body{
    font-family:"Quicksand",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--ink);
    background:linear-gradient(165deg,#fff0f6 0%,#f6ecff 55%,#eef1ff 100%);
    display:flex; justify-content:center;
  }
  .app{ width:100%; max-width:480px; height:100dvh; display:flex; flex-direction:column;
    background:linear-gradient(170deg,#fff6fb,#f7f0ff); box-shadow:0 0 60px rgba(176,108,255,.18); position:relative; }

  /* header */
  .head{ display:flex; align-items:center; gap:12px; padding:12px 16px;
    background:var(--grad); color:#fff; box-shadow:0 6px 22px rgba(176,108,255,.35); z-index:5; }
  .head .av{ width:46px; height:46px; border-radius:50%; object-fit:cover; border:2px solid rgba(255,255,255,.7);
    background:rgba(255,255,255,.25); display:grid; place-items:center; font-size:22px; font-weight:700; flex-shrink:0; }
  .head .nm{ font-weight:700; font-size:16px; line-height:1.1; }
  .head .st{ font-size:12px; opacity:.92; display:flex; align-items:center; gap:5px; }
  .head .st .live{ width:7px; height:7px; border-radius:50%; background:#7CFFB2; box-shadow:0 0 8px #7CFFB2; }
  .head .gal{ margin-left:auto; background:rgba(255,255,255,.18); border:none; color:#fff; cursor:pointer;
    padding:8px 12px; border-radius:999px; font-family:inherit; font-weight:600; font-size:13px; display:flex; align-items:center; gap:6px; }
  .head .gal:hover{ background:rgba(255,255,255,.3); }

  /* messages */
  .msgs{ flex:1; overflow-y:auto; padding:18px 14px 8px; display:flex; flex-direction:column; gap:9px; scroll-behavior:smooth; }
  .b{ max-width:78%; padding:10px 14px; border-radius:20px; font-size:15px; line-height:1.4; word-wrap:break-word;
    animation:pop .25s ease; box-shadow:0 2px 10px rgba(140,100,160,.10); }
  @keyframes pop{ from{ transform:translateY(8px) scale(.96); opacity:0; } to{ transform:none; opacity:1; } }
  .b.her{ align-self:flex-start; background:var(--card); color:var(--ink); border-bottom-left-radius:7px; }
  .b.me{ align-self:flex-end; background:var(--grad); color:#fff; border-bottom-right-radius:7px; box-shadow:0 4px 14px rgba(176,108,255,.32); }
  .typing{ align-self:flex-start; background:var(--card); padding:13px 16px; border-radius:20px; border-bottom-left-radius:7px; display:none; gap:4px; }
  .typing.show{ display:inline-flex; }
  .typing i{ width:8px; height:8px; border-radius:50%; background:var(--lav); opacity:.55; animation:bd 1.1s infinite; }
  .typing i:nth-child(2){ animation-delay:.18s; } .typing i:nth-child(3){ animation-delay:.36s; }
  @keyframes bd{ 0%,60%,100%{ transform:translateY(0); opacity:.45; } 30%{ transform:translateY(-5px); opacity:1; } }

  /* composer */
  .composer{ display:flex; align-items:center; gap:8px; padding:10px 12px; background:rgba(255,255,255,.7);
    backdrop-filter:blur(8px); border-top:1px solid var(--line); position:relative; }
  .composer .emoji{ background:none; border:none; font-size:22px; cursor:pointer; padding:4px; }
  .composer input{ flex:1; border:1px solid var(--line); background:#fff; border-radius:22px; padding:11px 16px;
    font-family:inherit; font-size:15px; color:var(--ink); outline:none; }
  .composer input:focus{ border-color:var(--lav); box-shadow:0 0 0 3px rgba(176,108,255,.16); }
  .composer .send{ width:44px; height:44px; border-radius:50%; border:none; background:var(--grad); color:#fff;
    font-size:18px; cursor:pointer; flex-shrink:0; box-shadow:0 4px 14px rgba(176,108,255,.4); }
  .composer .send:active{ transform:scale(.92); }
  .emojibar{ position:absolute; bottom:62px; left:10px; right:10px; background:#fff; border:1px solid var(--line);
    border-radius:16px; padding:10px; display:none; flex-wrap:wrap; gap:4px; box-shadow:0 10px 30px rgba(140,100,160,.25); z-index:6; }
  .emojibar.show{ display:flex; }
  .emojibar span{ font-size:22px; cursor:pointer; padding:4px 6px; border-radius:8px; }
  .emojibar span:hover{ background:#fbeffb; }

  /* banner */
  .banner{ margin:0; text-decoration:none; display:block; text-align:center; color:#fff; font-weight:700; font-size:15px;
    padding:13px 16px; background:linear-gradient(120deg,#ff7eb3,#ff9ec7,#b06cff,#ff7eb3); background-size:300% 100%;
    animation:slide 6s ease infinite; box-shadow:0 -2px 16px rgba(176,108,255,.25); }
  @keyframes slide{ 0%{ background-position:0% 50%; } 50%{ background-position:100% 50%; } 100%{ background-position:0% 50%; } }
  .ads{ background:#fff; }
  .ads:empty{ display:none; }
  .disc{ text-align:center; font-size:11px; color:var(--soft); padding:7px 12px; background:rgba(255,255,255,.6); }
</style>
</head>
<body>
<div class="app">
  <div class="head">
    <div class="av" id="av">💕</div>
    <div>
      <div class="nm" id="nm">…</div>
      <div class="st"><span class="live"></span><span id="st">online</span></div>
    </div>
    <button class="gal" onclick="location.href='/chat/galeria'">📸 Galeria</button>
  </div>

  <div class="msgs" id="msgs">
    <div class="typing" id="typing"><i></i><i></i><i></i></div>
  </div>

  <div class="composer">
    <button class="emoji" onclick="toggleEmoji()" type="button">😊</button>
    <input id="inp" placeholder="Mensagem…" autocomplete="off" maxlength="500"
           onkeydown="if(event.key==='Enter'){event.preventDefault();send();}">
    <button class="send" onclick="send()" type="button">➤</button>
    <div class="emojibar" id="emojibar"></div>
  </div>

  <a class="banner" id="banner" style="display:none" target="_blank" rel="noopener"></a>
  <div class="ads" id="ads"></div>
  <div class="disc" id="disc"></div>
</div>

<script>
const $ = id => document.getElementById(id);
let history = [], busy = false, persona = {};

const EMOJIS = "😊😍🥰😘😉😏😅😂🥺🙈😋💕💖💗❤️🔥✨🌙💋👀🙊😇🤭💌🌸🦋💜😜🤤".split("");
$('emojibar').innerHTML = EMOJIS.map(e=>`<span onclick="addEmoji('${e}')">${e}</span>`).join('');
function toggleEmoji(){ $('emojibar').classList.toggle('show'); }
function addEmoji(e){ $('inp').value += e; $('inp').focus(); }

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function scroll(){ const m=$('msgs'); m.scrollTop = m.scrollHeight; }
function addBubble(text, who){
  const d=document.createElement('div'); d.className='b '+(who==='me'?'me':'her'); d.textContent=text;
  $('msgs').insertBefore(d, $('typing')); scroll();
}
function showTyping(on){ $('typing').classList.toggle('show', on); if(on) scroll(); }
const sleep = ms => new Promise(r=>setTimeout(r,ms));

// carrega persona + saudação
fetch('/api/chat/persona').then(r=>r.json()).then(async p=>{
  persona = p;
  $('nm').textContent = p.name || 'Ela';
  $('st').textContent = p.status || 'online';
  document.title = (p.name||'Chat') + ' 💬';
  if(p.avatar){ $('av').innerHTML = `<img src="${p.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`; }
  else { $('av').textContent = (p.name||'?').trim().charAt(0).toUpperCase(); }
  if(p.banner && p.banner.enabled && p.banner.title){
    const b=$('banner'); b.textContent=p.banner.title; b.href=p.banner.link||'#'; b.style.display='block';
    if(p.banner.color1 && p.banner.color2)
      b.style.background=`linear-gradient(120deg,${p.banner.color1},${p.banner.color2},${p.banner.color1})`,
      b.style.backgroundSize='300% 100%';
  }
  if(p.ads && p.ads.enabled && p.ads.code){ $('ads').innerHTML = p.ads.code; }
  $('disc').textContent = p.disclaimer || '';
  // saudação
  const greet = (p.greeting||'oii 🥰').split('\n').filter(x=>x.trim());
  await sleep(500);
  for(const g of greet){ showTyping(true); await sleep(700+g.length*18); showTyping(false); addBubble(g,'her'); history.push({role:'persona',text:g}); await sleep(250); }
}).catch(()=>{ addBubble('não consegui carregar 🥺','her'); });

async function send(){
  const v = $('inp').value.trim();
  if(!v || busy) return;
  $('emojibar').classList.remove('show');
  $('inp').value=''; addBubble(v,'me'); history.push({role:'user',text:v});
  busy=true;
  await sleep(400); showTyping(true);
  let bubbles=[];
  try{
    const r = await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:v, history:history.slice(-12)})});
    bubbles = (await r.json()).bubbles || [];
  }catch(e){ bubbles=['opa, travei aqui 🙈']; }
  showTyping(false);
  for(let i=0;i<bubbles.length;i++){
    if(i>0){ showTyping(true); await sleep(550+bubbles[i].length*16); showTyping(false); }
    addBubble(bubbles[i],'her'); history.push({role:'persona',text:bubbles[i]}); await sleep(200);
  }
  busy=false;
}
document.addEventListener('click',e=>{ if(!e.target.closest('.composer')) $('emojibar').classList.remove('show'); });
</script>
</body>
</html>
