name: Build & Deploy Worker

on:
  push:
    branches: [claude/inspiring-ramanujan-j5qm8z]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-endpoint:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: vars.RUNPOD_ENDPOINT_ID != ''

    steps:
      # Best-effort: nunca marca o build como falho. Se não rolar, é só atualizar
      # o endpoint manualmente no console do RunPod (Serverless → salvar/release).
      - name: Update RunPod endpoint image
        continue-on-error: true
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          ENDPOINT_ID: ${{ vars.RUNPOD_ENDPOINT_ID }}
          IMAGE: ghcr.io/${{ github.repository }}:latest
        run: |
          # REST API atual do RunPod: atualiza o TEMPLATE (imageName) do endpoint,
          # o que dispara um rolling release. Auth via Bearer token (sem \n no secret).
          KEY="$(printf '%s' "$RUNPOD_API_KEY" | tr -d '[:space:]')"
          TID="$(curl -s -H "Authorization: Bearer ${KEY}" \
            "https://rest.runpod.io/v1/endpoints/${ENDPOINT_ID}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('templateId',''))" 2>/dev/null)"
          echo "templateId: ${TID:-<vazio>}"
          if [ -n "$TID" ]; then
            resp="$(curl -s -X PATCH "https://rest.runpod.io/v1/templates/${TID}" \
              -H "Authorization: Bearer ${KEY}" -H "Content-Type: application/json" \
              -d "{\"imageName\": \"${IMAGE}\"}")"
            echo "RunPod template update: $resp"
          else
            echo "Não consegui o templateId — atualize o endpoint manualmente no console do RunPod."
          fi
