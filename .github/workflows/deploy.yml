name: Build & Deploy Worker

on:
  push:
    branches: [claude/inspiring-ramanujan-j5qm8z]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-endpoint:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: vars.RUNPOD_ENDPOINT_ID != ''

    steps:
      - name: Update RunPod endpoint image
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          ENDPOINT_ID: ${{ vars.RUNPOD_ENDPOINT_ID }}
          IMAGE: ghcr.io/${{ github.repository }}:latest
        run: |
          # Remove qualquer espaço/quebra de linha do secret (um \n no fim quebrava a URL → curl exit 3).
          KEY="$(printf '%s' "$RUNPOD_API_KEY" | tr -d '[:space:]')"
          resp="$(curl -s -X POST \
            "https://api.runpod.io/graphql?api_key=${KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { updateEndpoint(input: { id: \\\"${ENDPOINT_ID}\\\", imageName: \\\"${IMAGE}\\\" }) { id imageName } }\"}")"
          echo "RunPod response: $resp"
          echo "$resp" | grep -q '"imageName"' || { echo "::error::RunPod endpoint update falhou (ver resposta acima)"; exit 1; }
          echo "Endpoint atualizado: ${ENDPOINT_ID}"
